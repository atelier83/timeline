<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timeline Playground</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        height: 100%;
        font-family: var(--a83-font);
        background: var(--a83-bg);
        color: var(--a83-text);
      }

      #app {
        width: 100vw;
        height: 100vh;
      }

      .box {
        position: absolute;
        width: 80px;
        height: 80px;
        border-radius: 12px;
        will-change: transform;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
